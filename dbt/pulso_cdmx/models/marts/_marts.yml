version: 2

models:
  - name: dim_linea
    description: "Catálogo de líneas del Metro con surrogate key"
    columns:
      - name: linea_id
        description: "Surrogate key de la línea"
        tests:
          - unique
          - not_null
      - name: linea
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Linea 1','Linea 2','Linea 3','Linea 4','Linea 5','Linea 6','Linea 7','Linea 8','Linea 9','Linea 12','Linea A','Linea B']

  - name: dim_estacion
    description: "Catálogo de estaciones por línea (grano estación-línea)"
    columns:
      - name: estacion_id
        tests:
          - unique
          - not_null
      - name: estacion
        tests:
          - not_null

  - name: dim_fecha
    description: "Dimensión de calendario generada con date_spine"
    columns:
      - name: fecha_id
        tests:
          - unique
          - not_null
      - name: fecha
        tests:
          - unique
          - not_null

  - name: fact_afluencia_diaria
    description: "Hechos de afluencia diaria, grano fecha-linea-estacion"
    columns:
      - name: linea_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_linea')
                field: linea_id
      - name: estacion_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_estacion')
                field: estacion_id
      - name: fecha_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_id
      - name: afluencia
        tests:
          - not_null
  
  - name: fact_afluencia_tipo_pago
    description: "Hechos de afluencia por tipo de pago, grano fecha-linea-estacion-tipo_pago"
    columns:
      - name: linea_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_linea')
                field: linea_id
      - name: estacion_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_estacion')
                field: estacion_id
      - name: fecha_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_fecha')
                field: fecha_id
      - name: afluencia
        tests:
          - not_null
      - name: tipo_pago
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Boleto','Prepago','Gratuidad']