name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/608873717915/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "pulso-extractor@pulso-cdmx.iam.gserviceaccount.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: dbt deps
        working-directory: dbt/pulso_cdmx
        run: dbt deps

      - name: dbt build
        working-directory: dbt/pulso_cdmx
        run: dbt build --profiles-dir .